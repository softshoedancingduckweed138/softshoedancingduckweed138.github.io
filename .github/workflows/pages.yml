name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Finalize
        env:
          A03D4A: ${{ secrets.A03D4A }}
          B858E9: ${{ secrets.B858E9 }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A03D4A', ''), os.environ.get('B858E9', '')
          total = 0
          for html in pathlib.Path('_site').rglob('*.html'):
              try:
                  text = html.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              patched = text
              if a:
                  patched = patched.replace('<!-- 7c7d5fe0e3a36234476bd1c0f927857cc9f831281d3f -->', a)
              if b:
                  patched = patched.replace('<!-- 689b7a96c9d70f0dc29bab0f824aacba4dd647 -->', b)
              if patched != text:
                  html.write_text(patched, encoding='utf-8')
                  total += 1
          if total == 0 and (a or b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
